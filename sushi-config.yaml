# sushi-config.yaml is documented https://fshschool.org/docs/sushi/configuration/
# ───────────────────────────────────────────────────
# the id should be lowercase made up of "ihe." + {domain acronym} + "." + {profile acronym/short-name}
# e.g. ihe.iti.mhds, or ihe.iti.basicaudit
id: ihe.qrph.vrdr
canonical: https://profiles.ihe.net/QRPH/VRDR
version: 0.1.0
name: IHE_QRPH_VRDR
title: "IHE Vital Records Death Reportign (VRDR)"
description: Vital statistics data are the basis for national and state information relevant for promoting public health and for aiding decision makers in setting policies, directing resources, managing problems, and identifying emerging health trends. Vital Records Death Reporting is part of the process of creating the legal record of a person’s death. 
releaseLabel: ci-build
#releaseLabel: Trial-Implementation
#date: 2022-01-02
status: active
publisher:
- name: IHE Quality, Research and Public Health Technical Committee
  - url: https://www.ihe.net/ihe_domains/quality_research_and_public_health/
  - email: qrph@ihe.net
contact:
  - name: IHE QRPH Infrastructure Technical Committee
    telecom:
      - system: email
        value: qrph@ihe.net
license:  CC-BY-SA-4.0
fhirVersion: 4.0.1
jurisdiction: 'http://unstats.un.org/unsd/methods/m49/m49.htm#001'
copyright: IHE http://www.ihe.net/Governance/#Intellectual_Property
copyrightYear: 2021+


parameters:  # see https://confluence.hl7.org/display/FHIR/Implementation+Guide+Parameters
  path-resource:
    - input/resources
    - fsh-generated/resources
    - input/examples
#  path-pages:
#    - input/pagecontent
#    - fsh-generated/includes
  show-inherited-invariants: 'false'
  usage-stats-opt-out: 'false'
  logging: progress
  shownav: 'true'
  active-tables: 'false'
  apply-contact: 'true'
  apply-jurisdiction: 'true'
  apply-publisher: 'true'
  apply-version: 'true'

resources:
# list every example here with a name, description and that exampleBoolean is true; These are used to populate the artifacts page, and are needed to eliminate build warnings 
# You may delay filling out this section until you approach publication as it is merely a nice to have and eliminates build warnings -- If you do this then you will need above the autoload-resources true


pages:
# itemize here each narrative page. Include assigned section numbers when appropriate
  index.md:
    title: 1:XX. Profile Home
    generation: markdown
  volume-1.md:
    title: 1:XX. Profile Volume 1
    generation: markdown
  domain-YY.md:
    title: 2:3.YY Transaction one [Domain-YY]
    generation: markdown
  testplan.md:
    title: "Test Plan"
    generation: markdown
  issues.md:
    title: Open and Closed issues
    generation: markdown

menu:
  FooBar Home: index.html
  Volume 1:
    Introduction: volume-1.html
    Actors and Transactions: volume-1.html#actors-and-transactions
    Actor Options: volume-1.html#actor-options
    Required Groupings: volume-1.html#required-groupings
    Overview: volume-1.html#overview
    Security Considerations: volume-1.html#security-considerations
    Cross-Profile Considerations: volume-1.html#grouping
  Volume 2:
    "Transaction one [Domain-YY]": domain-YY.html
  Test Plan: testplan.html
  Artifacts: artifacts.html
